<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PiP Split View Test</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
    }

    button {
      margin: 5px 0;
      padding: 10px;
    }

    #log {
      margin-top: 10px;
      background: #f4f4f4;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>PiP Split View Demo</h2>

<button id="open">Open PiP Split View</button>
<button id="update">Update Content</button>
<button id="close">Close PiP</button>

<div id="log"></div>

<script>
let pip = null;
let counter = 0;

function log(msg) {
  document.getElementById("log").innerText += msg + "\n";
}

async function openPiP() {
  if (!documentPictureInPicture) {
    log("PiP not supported");
    return;
  }

  pip = await documentPictureInPicture.requestWindow();
  pip.resizeTo(700, 450);

  pip.document.body.innerHTML = `
    <style>
      html, body {
        margin: 0;
        height: 100%;
        display: flex;
        font-family: sans-serif;
      }

      .left {
        width: 50%;
        background: #111;
        color: white;
        padding: 10px;
        box-sizing: border-box;
      }

      .right {
        width: 50%;
        background: #f2f2f2;
        color: black;
        padding: 10px;
        box-sizing: border-box;
      }

      .box {
        margin-top: 10px;
        padding: 8px;
        border: 1px solid #ccc;
      }
    </style>

    <div class="left">
      <h3>Left Panel</h3>
      <div id="leftContent">Waiting...</div>
    </div>

    <div class="right">
      <h3>Right Panel</h3>
      <div id="rightContent">Idle state</div>
    </div>
  `;

  log("PiP split view opened");
}

function updatePiP() {
  if (!pip) {
    log("PiP not open");
    return;
  }

  counter++;

  const left = pip.document.getElementById("leftContent");
  const right = pip.document.getElementById("rightContent");

  left.innerText = "Left update #" + counter + " @ " + new Date().toLocaleTimeString();
  right.innerText = "Right sync data #" + counter;

  log("Updated split view: " + counter);
}

function closePiP() {
  if (pip) {
    pip.close();
    pip = null;
    log("PiP closed");
  }
}

document.getElementById("open").onclick = openPiP;
document.getElementById("update").onclick = updatePiP;
document.getElementById("close").onclick = closePiP;
</script>

</body>
</html>
