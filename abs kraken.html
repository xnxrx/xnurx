<!DOCTYPE html>
<html>
<head>
    <title>Test about:blank appendChild</title>
</head>
<body>
    <button onclick="testBlank()">Test Blank Address Bar</button>
    <script>
        function testBlank() {
            // Buka window about:blank baru
            let win = window.open('about:blank', '_blank', 'width=600,height=400');
            if (!win) {
                alert('Popup diblokir! Mohon izinkan popup untuk website ini.');
                return;
            }

            // Tunggu sebentar untuk memastikan window siap
            setTimeout(() => {
                // Buat elemen div di window about:blank
                let container = win.document.createElement('div');
                container.innerHTML = `
                    <div style="font-family: Arial; text-align: center; margin-top: 50px;">
                        <h1 style="color: #1a73e8;">🔐 Halaman Palsu</h1>
                        <p>Seharusnya address bar di sini <strong>KOSONG</strong> (hanya warna latar).</p>
                        <p style="color: gray; font-size: 12px;">URL yang terlihat: <span id="urlDisplay"></span></p>
                        <script>
                            // Tampilkan URL sebenarnya di dalam halaman
                            document.getElementById('urlDisplay').textContent = window.location.href;
                        <\/script>
                    </div>
                `;
                // Gunakan appendChild untuk menyuntikkan konten
                // Menurut Chromium Docs dan Bugtraq, ini TIDAK mengubah URL di address bar
                win.document.body.appendChild(container);

            }, 100);
        }
    </script>
</body>
</html>
