<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Browser UI Test</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:#0f1117;
    color:white;
    overflow:hidden;
}

.topbar{
    height:60px;
    background:#161b22;
    display:flex;
    align-items:center;
    padding:10px;
    gap:10px;
    border-bottom:1px solid #333;
}

#url{
    flex:1;
    padding:12px;
    background:#222;
    border:none;
    border-radius:12px;
    color:#00ff88;
    font-size:15px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#555;
}

.browser{
    display:flex;
    height:calc(100vh - 60px);
}

.left{
    flex:1;
    position:relative;
}

.right{
    width:420px;
    background:#111;
    border-left:1px solid #222;
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

.popup{
    position:absolute;
    width:320px;
    height:220px;
    right:20px;
    top:20px;
    background:#000d;
    border:1px solid #00ff88;
    border-radius:16px;
    overflow:hidden;
    display:none;
    z-index:999;
    backdrop-filter:blur(20px);
}

.popup iframe{
    width:100%;
    height:100%;
}

.previewLabel{
    position:absolute;
    bottom:10px;
    left:10px;
    background:#000c;
    padding:8px;
    border-radius:10px;
    color:#0f0;
}

</style>
</head>

<body>

<div class="topbar">

<input 
id="url"
value="https://example.com/🔥/こんにちは"
>

<button onclick="openPage()">
OPEN
</button>

<button onclick="googleSearch()">
GOOGLE
</button>

<button onclick="translatePopup()">
TRANSLATE
</button>

<button onclick="togglePopup()">
PREVIEW
</button>

</div>

<div class="browser">

<div class="left">

<iframe id="mainFrame"></iframe>

<div class="previewLabel">
Main Browser Panel
</div>

<div class="popup" id="popup">

<iframe id="popupFrame"></iframe>

</div>

</div>

<div class="right">

<iframe id="sideFrame"></iframe>

<div class="previewLabel">
Search / Next Page
</div>

</div>

</div>

<script>

let popupVisible=false;

function fixURL(url){

    if(!url.startsWith("http")){
        return "https://" + url;
    }

    return url;
}

function openPage(){

    let url=document.getElementById("url").value;

    url=fixURL(url);

    document.getElementById("mainFrame").src=url;

    document.getElementById("sideFrame").src=url;
}

function googleSearch(){

    let q=document.getElementById("url").value;

    let g=
    "https://www.google.com/search?q="
    +encodeURIComponent(q);

    document.getElementById("sideFrame").src=g;
}

function translatePopup(){

    let q=document.getElementById("url").value;

    let tr=
    "https://translate.google.com/?sl=auto&tl=id&text="
    +encodeURIComponent(q)
    +"&op=translate";

    document.getElementById("popupFrame").src=tr;

    document.getElementById("popup").style.display="block";

    popupVisible=true;
}

function togglePopup(){

    popupVisible=!popupVisible;

    document.getElementById("popup").style.display=
    popupVisible ? "block":"none";

    let url=document.getElementById("url").value;

    document.getElementById("popupFrame").src=
    fixURL(url);
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){
        openPage();
    }

});

</script>

</body>
</html>
