<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>VOID CHAOS ENGINE</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ff99;
    font-family:monospace;
    overflow:hidden;
}

.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

button{
    padding:14px 22px;
    background:black;
    color:#00ff99;
    border:1px solid #00ff99;
    cursor:pointer;
    font-size:16px;
}

button:hover{

}

.glitch{
    animation:flicker .08s infinite;
}

@keyframes flicker{
    0%{opacity:1}
    50%{opacity:.3}
    100%{opacity:1}
}

.stream{
    position:fixed;
    pointer-events:none;
    font-size:12px;
    opacity:.7;
}

    </p>

    <button onclick="openChaos()">
        OPEN VOID WINDOW
    </button>

</div>

<script>

function openChaos(){

    const x = window.open(
        "about:blank",
        "_blank",
        "width=420,height=320"
    );

    if(!x){
        alert("Popup blocked");
        return;
    }

    // stage 1
    x.document.write(`

<!DOCTYPE html>

<style>

    background:black;

}

</style>

</head>

<body>

</body>

    `);

    x.document.close();

    // stage 2
    setTimeout(() => {

        x.document.open();

        x.document.write(`

<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>VOID SYSTEM ACTIVE</title>

<style>

body{
    margin:0;
    background:
        radial-gradient(circle,#111,#000);
    color:#00ff99;
    font-family:monospace;
    overflow:hidden;
}

.panel{
    width:90%;
    margin:20px auto;
    padding:15px;

</button>

Terminate
</button>

</div>

<script>

const loops = [];

function addLoop(fn,time){
    loops.push(
        setInterval(fn,time)
    );
}

function rand(len=8){
    return Math.random()
        .toString(36)
        .substring(2,2+len);
}

// address mutation
addLoop(()=>{

    document.getElementById("addr")
        .innerHTML =
        "address://unknown/" +
        rand(10);

},300);

// title mutation
addLoop(()=>{

    document.title =
        "VOID://" +
        rand(6);

},600);

// floating random text
addLoop(()=>{

    const div =
        document.createElement("div");

    div.className = "stream";

    div.innerHTML =
        rand(20);

    div.style.left =
        Math.random()*window.innerWidth+"px";

    div.style.top =
        Math.random()*window.innerHeight+"px";

    div.style.color =
        "hsl(" +
        Math.random()*360 +
        ",100%,50%)";

    div.style.transform =
        "rotate(" +
        Math.random()*360 +
        "deg)";

    document.body.appendChild(div);

    if(document.body.children.length > 150){

        document.body.removeChild(
            document.body.children[3]
        );

    }

},40);

// random visual corruption
addLoop(()=>{

    document.body.style.filter =
        \`
        hue-rotate(\${Math.random()*360}deg)
        blur(\${Math.random()*2}px)
        contrast(\${1+Math.random()*4})
        \`;

},120);

    console.log(
        "%cVOID://" + rand(10),

        \`
        color:hsl(\${Math.random()*360},100%,50%);
        font-size:\${10+Math.random()*30}px;
        \`
    );

},100);

// recursive popup

    const weird =
        btoa(
            "<h1>VOID NODE</h1>" +
            rand(50)
        );

    const w = window.open(
        "data:text/html;base64," + weird,
        "_blank",
        "width=300,height=200"
    );

    if(!w) return;

    setTimeout(() => {

        try{

            w.document.body.style.background =
                "black";

            w.document.body.style.color =
                "lime";

            w.document.body.style.fontFamily =
                "monospace";

            w.document.body.innerHTML +=
                "<br><br>recursive node active: " +
                rand(12);

        }catch(e){}

    },800);

}
