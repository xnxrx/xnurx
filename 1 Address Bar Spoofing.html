    function updateUrlMonitor() {

        isExploiting = isActive;

    function cleanup() {
        if (activeInterval) {
            clearInterval(activeInterval);
            activeInterval = null;
        }
        
        window.history.pushState = originalPushState;
        window.history.replaceState = originalReplaceState;
        
        if (activePopup && !activePopup.closed) {
            activePopup.close();

        cleanup();

                        }
