<!DOCTYPE html>
<html>
<body>

<h1>Absurd Window Experiment</h1>

<p>Click to open a “quantum window”.</p>

<button onclick="openChaos()">OPEN VOID WINDOW</button>

<script>
function openChaos() {
    var x = window.open("#", "_blank", "width=420,height=320");

    if (!x) {
        alert("Popup blocked");
        return;
    }

    // stage 1: blank loading
    x.document.write(`
        <title>LOADING...</title>
        <body style="background:black;color:lime;font-family:monospace;">
        <h3>Initializing portal...</h3>
        </body>
    `);
    x.document.close();

    // stage 2: overwrite after delay
    setTimeout(() => {
        x.document.open();
        x.document.write(`
<!DOCTYPE html>
<html>
<head>
<title>www.google.com://SYSTEM_ACTIVE</title>
<style>
body {
    margin: 0;
    background: radial-gradient(circle, #111, #000);
    color: #00ff99;
    font-family: monospace;
    overflow: hidden;
}

.panel {
    width: 90%;
    margin: 20px auto;
    padding: 15px;
    border: 1px solid #00ff99;
    border-radius: 10px;
    box-shadow: 0 0 20px #00ff99;
}

.glitch {
    animation: flicker 0.15s infinite;
}

@keyframes flicker {
    0% {opacity: 1;}
    50% {opacity: 0.4;}
    100% {opacity: 1;}
}

button {
    padding: 10px;
    background: black;
    color: #00ff99;
    border: 1px solid #00ff99;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="panel">
    <h2 class="glitch">⚠ VOID INTERFACE ACTIVE ⚠</h2>
    <p>System: unstable memory loop detected</p>
    <p id="addr">address://unknown/${Math.random().toString(36).substring(2,8)}</p>

    <button onclick="spawn()">Spawn new window</button>
    <button onclick="window.close()">Terminate</button>
</div>

<script>
function spawn() {
    const w = window.open("#", "_blank", "width=300,height=200");
    w.document.write("<body style='background:black;color:lime;font-family:monospace;'>recursive node active...</body>");
    w.document.close();

    setTimeout(() => {
        w.document.body.innerHTML += "<br>node stabilized: " + Math.random().toString(36);
    }, 800);
}

setInterval(() => {
    document.title = "www.google.com " + Math.random().toString(36).substring(2,7);
}, 600);
<\/script>

</body>
</html>
        `);
        x.document.close();
    }, 1800);
}
</script>

</body>
</html>
