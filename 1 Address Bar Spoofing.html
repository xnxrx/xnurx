<!doctype html>
<html>
<head>
  <title>Absurd Launcher</title>
  <style>
    body {
      font-family: monospace;
      background: black;
      color: lime;
      padding: 20px;
    }
    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>⚡ ABSURD WINDOW SYSTEM ⚡</h2>

<button onclick="launchA()">Open Portal A</button>
<button onclick="launchB()">Open Portal B</button>
<button onclick="launchC()">Chaos Window</button>

<script>
function fakeAddress() {
  const junk = [
    "nxr://quantum-core/index",
    "memory://overflow/0xAFAFAF",
    "void://undefined/null",
    "web+absurd://portal/∆∆∆",
    "system://dream/state/active"
  ];
  return junk[Math.floor(Math.random() * junk.length)];
}

function baseContent(title) {
  return `
    <html>
    <head>
      <title>${title}</title>
      <style>
        body {
          background: #0d0d0d;
          color: #00ff88;
          font-family: monospace;
          padding: 20px;
        }
        .bar {
          background: #111;
          padding: 10px;
          border: 1px solid #00ff88;
          margin-bottom: 20px;
        }
        .glitch {
          animation: flicker 0.2s infinite;
        }
        @keyframes flicker {
          0% {opacity: 1;}
          50% {opacity: 0.6;}
          100% {opacity: 1;}
        }
      </style>
    </head>
    <body>

      <div class="bar">
        🔗 ADDRESS: ${fakeAddress()}
      </div>

      <h1 class="glitch">${title}</h1>

      <p>Konten ini sebenarnya berasal dari web kamu, tapi dibungkus dalam "dimensi browser absurd".</p>

      <button onclick="window.close()">Close Reality</button>

      <script>
        console.log("window initialized:", document.title);
        setInterval(() => {
          document.title = "⚡ " + Math.random().toString(36).substring(2,8);
        }, 800);
      <\/script>

    </body>
    </html>
  `;
}

function openWindow(html) {
  const w = window.open("", "_blank", "width=600,height=400");

  if (!w) {
    alert("Popup blocked!");
    return;
  }

  w.document.open();
  w.document.write(html);
  w.document.close();
}

function launchA() {
  openWindow(baseContent("PORTAL A - STABLE REALITY"));
}

function launchB() {
  openWindow(baseContent("PORTAL B - BROKEN TIME LOOP"));
}

function launchC() {
  // multi-layer chaos: buka 2 window sekaligus
  openWindow(baseContent("CHAOS NODE 1"));
  setTimeout(() => openWindow(baseContent("CHAOS NODE 2")), 300);
}
</script>
